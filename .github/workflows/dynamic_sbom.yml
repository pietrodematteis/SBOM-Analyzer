name: Dynamic Dependencies SBOM Analyzer

on:
  workflow_dispatch:
    inputs:
      src_repository:
        description: 'Repository target da clonare (owner/repo)'
        required: true
      src_branch:
        description: 'Branch della repo target'
        required: true
        default: 'main'
      path_dipendenze:
        description: 'Path del file delle dipendenze'
        required: true
        default: 'dependencies.json'

jobs:
  # --- JOB 1: ESTRAZIONE MATRICE ---
  parse-dependencies:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Parse JSON to Matrix
        id: set-matrix
        run: |
          # Legge tutto l'array dal file
          DEPENDENCIES=$(jq -c '.' ${{ github.event.inputs.path_dipendenze }})
          echo "matrix=$DEPENDENCIES" >> $GITHUB_OUTPUT

  # --- JOB 2: ANALISI IN PARALLELO ---
  trivy-analysis:
    needs: parse-dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        item: ${{ fromJson(needs.parse-dependencies.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Setup and Analyze
        run: |
          # Accesso diretto ai campi dell'oggetto item della matrice
          TYPE="${{ matrix.item.type }}"
          URL="${{ matrix.item.url }}"
          PATH_DIR="${{ matrix.item.path || '.' }}"
          
          # Nome file unico per l'artefatto
          CLEAN_NAME=$(echo "${TYPE}-${URL}" | sed 's|[^a-zA-Z0-9]|-|g' | sed 's|---*|-|g')
          
          echo ">>> Elaborazione: $TYPE"
          
          # Creiamo una cartella isolata per l'analisi del componente
          mkdir -p workspace_analisi
          
          case $TYPE in
            "git") git clone --depth 1 "$URL" workspace_analisi/repo ;;

            "apt") sudo apt-get install -y "$URL" && cp /var/lib/dpkg/status workspace_analisi/ ;;

            "pip") 
              # Creazione ambiente isolato
              python3 -m venv workspace_analisi/venv
              
              # Pulizia dell'URL per rimuovere eventuali spazi bianchi
              CLEAN_URL=$(echo "$URL" | xargs)
              
              # Logica intelligente: riconosce se è un file o un pacchetto
              if [[ "$CLEAN_URL" == -r* ]]; then
                  # È un file: estrai il path e installa
                  FILE_PATH=$(echo "$CLEAN_URL" | sed 's/^-r //')
                  ABSOLUTE_PATH="$GITHUB_WORKSPACE/$FILE_PATH"
                  
                  if [ -f "$ABSOLUTE_PATH" ]; then
                      # Proviamo a installare, ma se fallisce, non fermiamo tutto (usiamo || true)
                      ./workspace_analisi/venv/bin/pip install --no-cache-dir -r "$ABSOLUTE_PATH" || \
                      echo "AVVISO: Installazione da $FILE_PATH parziale o fallita, proseguo comunque."
                  else
                      echo "ATTENZIONE: File $ABSOLUTE_PATH non trovato. Salto questa dipendenza."
                  fi
              else
                  ./workspace_analisi/venv/bin/pip install --no-cache-dir "$CLEAN_URL" || \
                  echo "AVVISO: Impossibile installare il pacchetto $CLEAN_URL, proseguo."
              fi
              
              # Genera il manifest per Trivy
              # Nota: se l'installazione è fallita, il file requirements.txt sarà vuoto o parziale,
              ./workspace_analisi/venv/bin/pip freeze > workspace_analisi/requirements.txt
              ;;

            "compile_maven") cd "$PATH_DIR" && mvn clean install -DskipTests && cp -r . workspace_analisi/ ;;

            "zip") wget -q "$URL" -O pkg.zip && unzip -o pkg.zip -d workspace_analisi/ ;;

            "file" | "cfg")
              # Controllo se è un URL web o un percorso locale
              if [[ "$URL" == http* ]]; then
                  # È un link web: scarica 
                  wget -q "$URL" -O workspace_analisi/file_target || echo "AVVISO: Impossibile scaricare $URL, salto..."
              else
                  # È un percorso locale: verifica se esiste e copialo
                  FILE_PATH="$GITHUB_WORKSPACE/$URL"
                  if [ -f "$FILE_PATH" ]; then
                      cp "$FILE_PATH" workspace_analisi/file_target
                  else
                      echo "AVVISO: File locale $FILE_PATH non trovato, salto."
                  fi
              fi
              ;;

          esac
          
          # ANALISI ISOLATA: Trivy guarda SOLO dentro 'workspace_analisi', in modo da non contaminare l'ambiente globale
          trivy fs --format cyclonedx --output "${CLEAN_NAME}-sbom.json" workspace_analisi/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ strategy.job-index }}
          path: "*-sbom.json"
          retention-days: 1

  # --- JOB 3: UNIFICAZIONE ---
  merge-sboms:
    needs: trivy-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Create Workspace Directory
        run: mkdir -p combined-results

      - name: Download All Temporary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: combined-results
          merge-multiple: true

      - name: Upload Consolidated Artifact to Backend
        uses: actions/upload-artifact@v4
        with:
          name: sbom-matrix-results
          path: combined-results/*.json
          retention-days: 1