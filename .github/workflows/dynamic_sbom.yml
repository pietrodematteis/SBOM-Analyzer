name: Dynamic Dependencies SBOM Analyzer

on:
  workflow_dispatch:
    inputs:
      src_repository:
        description: 'Repository target da clonare (owner/repo)'
        required: true
      src_branch:
        description: 'Branch della repo target'
        required: true
        default: 'main'
      path_dipendenze:
        description: 'Path del file delle dipendenze'
        required: true
        default: 'dependencies.json'

jobs:
  # --- JOB 1: ESTRAZIONE MATRICE ---
  parse-dependencies:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Parse JSON to Matrix
        id: set-matrix
        run: |
          # Legge tutto l'array dal file
          DEPENDENCIES=$(jq -c '.' ${{ github.event.inputs.path_dipendenze }})
          echo "matrix=$DEPENDENCIES" >> $GITHUB_OUTPUT

  # --- JOB 2: ANALISI IN PARALLELO ---
  trivy-analysis:
    needs: parse-dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        item: ${{ fromJson(needs.parse-dependencies.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Setup and Analyze
        run: |
          # Accesso diretto ai campi dell'oggetto item della matrice
          TYPE="${{ matrix.item.type }}"
          URL="${{ matrix.item.url }}"
          CMD="${{ matrix.item.cmd }}"
          PATH_DIR="${{ matrix.item.path || '.' }}"
          
          # Nome file unico per l'artefatto
          CLEAN_NAME=$(echo "$URL$TYPE" | sed 's|[^a-zA-Z0-9]|-|g' | cut -c 1-30)
          
          echo ">>> Elaborazione: $TYPE"
          case $TYPE in
            "git") git clone --depth 1 "$URL" target_repo || true ;;
            "apt") sudo apt-get install -y "$URL" || true ;;
            "pip") pip install "$URL" || true ;;
            "compile_maven") cd "$PATH_DIR" && mvn clean install -DskipTests || true ;;
            "zip") wget -q "$URL" -O pkg.zip && unzip -o pkg.zip || true ;;
            "file" | "cfg") wget -q "$URL" || true ;;
          esac
          
          trivy fs --format cyclonedx --output "${CLEAN_NAME}-sbom.json" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ strategy.job-index }}
          path: "*-sbom.json"
          retention-days: 1

  # --- JOB 3: UNIFICAZIONE ---
  merge-sboms:
    needs: trivy-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Create Workspace Directory
        run: mkdir -p combined-results

      - name: Download All Temporary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: combined-results
          merge-multiple: true

      - name: Upload Consolidated Artifact to Backend
        uses: actions/upload-artifact@v4
        with:
          name: sbom-matrix-results
          path: combined-results/*.json
          retention-days: 1