name: Dynamic Dependencies SBOM Analyzer

on:
  workflow_dispatch:
    inputs:
      src_repository:
        description: 'Repository target da clonare'
        required: true
      src_branch:
        description: 'Branch della repo target'
        required: true
        default: 'main'
      path_dipendenze:
        description: 'Path del file delle dipendenze'
        required: true
        default: 'dependencies.json'

jobs:
  parse-dependencies:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Carica tutto il file JSON nella matrice
          MATRIX=$(jq -c '.' ${{ github.event.inputs.path_dipendenze }})
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  trivy-analysis:
    needs: parse-dependencies
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dep: ${{ fromJson(needs.parse-dependencies.outputs.matrix) }}
    
    steps:
      - name: Setup Workspace
        run: mkdir -p workspace && cd workspace

      - name: Process Dependency
        run: |
          cd workspace
          TYPE="${{ matrix.dep.type }}"
          URL="${{ matrix.dep.url }}"
          
          # Logica per gestire i vari tipi definiti nel JSON
          case "$TYPE" in
            git)
              git clone --depth 1 $URL repo_$(echo $URL | sed 's|.*/||')
              ;;
            git-checkout)
              git clone --depth 1 https://github.com/${{ github.event.inputs.src_repository }} repo_checkout
              cd repo_checkout
              git checkout ${{ matrix.dep.cmd }} || true
              ;;
            git-submodule)
              git clone --depth 1 https://github.com/${{ github.event.inputs.src_repository }} repo_sub
              cd repo_sub
              git submodule update --init --recursive ${{ matrix.dep.path }} || true
              ;;
            apt|pip|cfg|zip|file|compile_maven)
              echo "Tipo $TYPE rilevato. Creazione cartella segnaposto per Trivy..."
              mkdir -p "data_$TYPE"
              echo "$URL" > "data_$TYPE/info.txt"
              ;;
            *)
              echo "Tipo non gestito: $TYPE"
              ;;
          esac

      - name: Generate SBOM
        run: |
          # Trivy scansiona tutto ciò che abbiamo messo nel workspace
          trivy fs --format cyclonedx --output "sbom-result-${{ github.run_id }}.json" workspace/ || echo "TRIVY_FAILED=true" >> $GITHUB_ENV

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}-${{ matrix.dep.type }}
          path: "*.json"
          retention-days: 1

  merge-sboms:
    needs: trivy-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: sboms
          pattern: sbom-${{ github.run_id }}-*
          merge-multiple: true
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-matrix-results
          path: sboms/*.json