name: Dynamic Dependencies SBOM Analyzer

on:
  workflow_dispatch:
    inputs:
      src_repository:
        description: 'Repository target da clonare (owner/repo)'
        required: true
      src_branch:
        description: 'Branch della repo target'
        required: true
        default: 'main'
      path_dipendenze:
        description: 'Path del file delle dipendenze'
        required: true
        default: 'dependencies.json'

jobs:
# ---------------------------------------------------
# JOB 1 - PARSE DEPENDENCIES
# ---------------------------------------------------
  parse-dependencies:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Build dependency matrix
        id: set-matrix
        run: |
          FILE="${{ github.event.inputs.path_dipendenze }}"

          echo "Using dependency file: $FILE"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: file not found -> $FILE"
            exit 1
          fi

          MATRIX=$(jq -c '[.[] | select(.type == "git" or .type == "git-checkout" or .type == "git-submodule")]' "$FILE")

          echo "Matrix: $MATRIX"

          if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
            echo "No valid git dependencies found"
            exit 1
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

# ---------------------------------------------------
# JOB 2 - ANALISI PARALLELA
# ---------------------------------------------------
  trivy-analysis:
    needs: parse-dependencies
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include: ${{ fromJson(needs.parse-dependencies.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Setup repo name
        id: repo
        run: |
          CLEAN=$(echo "${{ matrix.url }}" \
            | sed 's|https://github.com/||' \
            | sed 's|/|-|g' \
            | sed 's|.git||')
          echo "name=$CLEAN" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget jq curl

      # -------------------------------
      # CLONE LOGIC INTELLIGENTE
      # -------------------------------
      - name: Clone repository
        run: |
          echo "Cloning ${{ matrix.url }}"
          git clone --depth 1 ${{ matrix.url }} repo

      # -------------------------------
      # GIT-CHECKOUT HANDLING
      # -------------------------------
      - name: Apply checkout rules
        if: matrix.type == 'git-checkout'
        run: |
          echo "Applying checkout: ${{ matrix.cmd }}"
          cd repo
          git fetch --all
          git checkout ${{ matrix.cmd }}

      # -------------------------------
      # SUBMODULE HANDLING
      # -------------------------------
      - name: Init submodules
        if: matrix.type == 'git-submodule'
        run: |
          cd repo
          git submodule update --init --recursive

      # -------------------------------
      # SBOM GENERATION
      # -------------------------------
      - name: Generate SBOM with Trivy
        run: |
          trivy fs \
            --format cyclonedx \
            --scanners vuln \
            --output "${{ steps.repo.outputs.name }}.json" \
            repo/ || echo "TRIVY_FAILED=true" >> $GITHUB_ENV

      # fallback file
      - name: Fallback if failed
        if: env.TRIVY_FAILED == 'true'
        run: |
          echo '{"status":"failed","repo":"${{ matrix.url }}", "message": "Failed to generate SBOM because of a Trivy error"}' > "${{ steps.repo.outputs.name }}.json"

      # upload per-repo artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmp-${{ steps.repo.outputs.name }}
          path: ${{ steps.repo.outputs.name }}.json
          retention-days: 1


# ---------------------------------------------------
# JOB 3 - MERGE FINAL SBOMS
# ---------------------------------------------------
  merge-sboms:
    needs: trivy-analysis
    runs-on: ubuntu-latest

    steps:
      - name: Create workspace
        run: mkdir -p sboms

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tmp-*
          path: sboms
          merge-multiple: true

      - name: Build final artifact
        run: |
          echo "Collected SBOMs:"
          ls -R sboms

      - name: Upload final SBOM bundle
        uses: actions/upload-artifact@v4
        with:
          name: sbom-matrix-results
          path: sboms/*.json
          retention-days: 1