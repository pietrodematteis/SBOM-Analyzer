name: Dynamic Dependencies SBOM Analyzer

on:
  workflow_dispatch:
    inputs:
      src_repository:
          description: 'Repository target da clonare (owner/repo)'
          required: true
      src_branch:
        description: 'Branch della repo target'
        required: true
        default: 'main'
      path_dipendenze:
        description: 'Path del file delle dipendenze'
        required: true
        default: 'dependencies.json'

jobs:
  # --- JOB 1: ESTRAZIONE MATRICE ---
  parse-dependencies:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Parse JSON to Matrix
        id: set-matrix
        run: |
          # Legge il file, filtra solo le url di github e crea un array JSON compatto
          # Esempio output: ["https://github.com/user/repo1", "https://github.com/user/repo2"]
          DEPENDENCIES=$(jq -c '[.[] | select(.url != null and (.url | contains("github.com"))) | .url]' ${{ github.event.inputs.path_dipendenze }})
          echo "Trovate le seguenti repo: $DEPENDENCIES"
          
          # Passa la matrice al job successivo
          echo "matrix=$DEPENDENCIES" >> $GITHUB_OUTPUT

  # --- JOB 2: ANALISI IN PARALLELO CON TRIVY NATIVO ---
  trivy-analysis:
    needs: parse-dependencies
    runs-on: ubuntu-latest
    if: ${{ needs.parse-dependencies.outputs.matrix != '[]' && needs.parse-dependencies.outputs.matrix != '' }}
    strategy:
      matrix:
        repo_url: ${{ fromJson(needs.parse-dependencies.outputs.matrix) }}
      fail-fast: false # Continua a ciclare anche se una repo dà errore
    
    steps:
      # Pulizia e formattazione del nome della repository
      - name: Clean up Repository Name
        id: repo-info
        run: |
          CLEAN_NAME=$(echo "${{ matrix.repo_url }}" | sed 's|https://github.com/||' | sed 's|/|-|g' | sed 's|.git||')
          echo "clean_name=$CLEAN_NAME" >> $GITHUB_OUTPUT

      # Installazione stabile della CLI ufficiale di Trivy sulla macchina virtuale
      - name: Install Trivy CLI
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.p/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      # Clonazione della singola dipendenza (con try/catch per evitare crash se la repo è privata/inesistente)
      - name: Clone Dependency Repository
        run: |
          git clone --depth 1 ${{ matrix.repo_url }} target_repo || echo "CLONE_FAILED=true" >> $GITHUB_ENV

      # Generazione dello SBOM tramite CLI nativa (analizza automaticamente Poetry, Pip, NPM, ecc.)
      - name: Generate CycloneDX SBOM
        if: env.CLONE_FAILED != 'true'
        run: |
          trivy fs \
            --format cyclonedx \
            --scanners vuln \
            --vuln-type library \
            --output "${{ steps.repo-info.outputs.clean_name }}-sbom.json" \
            target_repo/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Caricamento dell'output nell'artifact 
      - name: Upload SBOM to Shared Artifact
        if: env.CLONE_FAILED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-matrix-results
          path: '${{ steps.repo-info.outputs.clean_name }}-sbom.json'
          retention-days: 1
          overwrite: false